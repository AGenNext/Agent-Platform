name: E2E Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # ── Fast unit tests (mocked DB, no Docker needed) ─────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docker/agent-knowledge
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docker/agent-knowledge/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short --asyncio-mode=auto

  # ── Full stack: API e2e + Playwright UI automation ────────────────────────
  e2e:
    name: E2E & UI Tests
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      # ── Python (API e2e) ──────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tests/e2e/requirements.txt

      - name: Install API e2e dependencies
        run: pip install -r tests/e2e/requirements.txt

      # ── Node (Playwright) ─────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright + browsers
        working-directory: tests/ui
        run: npm install && npx playwright install --with-deps chromium

      # ── Docker Compose stack ──────────────────────────────────────────────
      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for agent-knowledge to be healthy
        run: |
          echo "Waiting for agent-knowledge..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8001/health > /dev/null 2>&1; then
              echo "agent-knowledge is healthy after ${i} attempts"
              break
            fi
            if [ "$i" -eq 40 ]; then
              echo "ERROR: agent-knowledge did not become healthy in time"
              docker compose logs agent-knowledge | tail -50
              exit 1
            fi
            sleep 5
          done

      - name: Wait for agent-dashboard to be healthy
        run: |
          echo "Waiting for agent-dashboard..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "agent-dashboard is healthy after ${i} attempts"
              break
            fi
            sleep 5
          done

      # ── API e2e tests ─────────────────────────────────────────────────────
      - name: Run API e2e tests
        working-directory: tests/e2e
        run: python -m pytest . -v --tb=short --asyncio-mode=auto
        env:
          E2E_API_URL: http://localhost:8001
          E2E_DASHBOARD_URL: http://localhost:3000

      # ── Playwright UI automation ──────────────────────────────────────────
      - name: Run Playwright UI tests
        working-directory: tests/ui
        run: npx playwright test --reporter=list
        env:
          E2E_DASHBOARD_URL: http://localhost:3000
          E2E_API_URL: http://localhost:8001

      # ── Artifacts & teardown ──────────────────────────────────────────────
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/ui/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: tests/ui/test-results/
          retention-days: 7

      - name: Dump service logs on failure
        if: failure()
        run: |
          echo "=== agent-knowledge ===" && docker compose logs agent-knowledge | tail -100
          echo "=== agent-dashboard ===" && docker compose logs agent-dashboard | tail -50
          echo "=== surrealdb ===" && docker compose logs surrealdb | tail -30

      - name: Stop stack
        if: always()
        run: docker compose down -v
