name: Governance

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    shell: bash

jobs:
  governance:
    name: Central Agent-deploy governance validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Agent-Platform
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          path: target

      - name: Checkout Agent-deploy validation owner
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          repository: AGenNext/Agent-deploy
          path: agent-deploy-validator

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run centralized governance validation
        run: ./agent-deploy-validator/scripts/validate_repo_governance.sh ./target
