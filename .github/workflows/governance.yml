name: Governance

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    shell: bash

jobs:
  governance:
    name: Central Agent-deploy governance validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Agent-Platform
        uses: actions/checkout@v4

      - name: Checkout Agent-deploy validation owner
        uses: actions/checkout@v4
        with:
          repository: AGenNext/Agent-deploy
          path: .agent-deploy

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run centralized governance validation
        run: ./.agent-deploy/scripts/validate_repo_governance.sh .
