name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-dashboard:
    name: Deploy Dashboard → Netlify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/agent-dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/agent-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline 2>/dev/null || npm install

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SURREALDB_URL: ${{ secrets.VITE_SURREALDB_URL }}
          VITE_SURREALDB_NS: agent_platform
          VITE_SURREALDB_DB: agent_platform

      - name: Deploy to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=services/agent-dashboard/dist --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  deploy-api:
    name: Deploy API → Fly.io
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/agent-knowledge-api

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
