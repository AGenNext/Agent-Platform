apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: realgraph-dev

resources:
  - ../../base

patches:
  - patch: |-
      - op: replace
        path: /data/PLATFORM_ENV
        value: dev
    target:
      kind: ConfigMap
      name: platform-config

  # Single replica in dev
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: agent-knowledge

  # Smaller PVCs in dev
  - patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 5Gi
    target:
      kind: PersistentVolumeClaim
      name: surrealdb-data

  - patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 10Gi
    target:
      kind: PersistentVolumeClaim
      name: minio-data

  # No HPA in dev
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 1
    target:
      kind: HorizontalPodAutoscaler
      name: agent-knowledge

  # No TLS in dev — plain HTTP
  - patch: |-
      - op: remove
        path: /spec/tls
      - op: remove
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
    target:
      kind: Ingress
      name: realgraph-ingress
