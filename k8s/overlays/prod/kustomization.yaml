apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: realgraph

resources:
  - ../../base

patches:
  - patch: |-
      - op: replace
        path: /data/PLATFORM_ENV
        value: prod
    target:
      kind: ConfigMap
      name: platform-config

  # Prod: 3 minimum replicas
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: agent-knowledge

  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 12
    target:
      kind: HorizontalPodAutoscaler
      name: agent-knowledge

  # Larger storage in prod
  - patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 100Gi
    target:
      kind: PersistentVolumeClaim
      name: surrealdb-data

  - patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 200Gi
    target:
      kind: PersistentVolumeClaim
      name: minio-data
