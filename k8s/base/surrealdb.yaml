---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: surrealdb-data
  namespace: realgraph
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: surrealdb
  namespace: realgraph
  labels:
    app: surrealdb
spec:
  serviceName: surrealdb
  replicas: 1
  selector:
    matchLabels:
      app: surrealdb
  template:
    metadata:
      labels:
        app: surrealdb
    spec:
      containers:
        - name: surrealdb
          image: surrealdb/surrealdb:v2
          args:
            - start
            - --log=info
            - --user=$(SURREAL_USER)
            - --pass=$(SURREAL_PASS)
            - file:/data/platform.db
          env:
            - name: SURREAL_USER
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: SURREALDB_USERNAME
            - name: SURREAL_PASS
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: SURREALDB_PASSWORD
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: [surreal, isready, --conn, http://localhost:8000]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            exec:
              command: [surreal, isready, --conn, http://localhost:8000]
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: surrealdb-data
---
apiVersion: v1
kind: Service
metadata:
  name: surrealdb
  namespace: realgraph
spec:
  selector:
    app: surrealdb
  ports:
    - port: 8000
      targetPort: 8000
