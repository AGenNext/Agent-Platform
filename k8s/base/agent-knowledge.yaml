---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-knowledge
  namespace: realgraph
  labels:
    app: agent-knowledge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-knowledge
  template:
    metadata:
      labels:
        app: agent-knowledge
    spec:
      containers:
        - name: agent-knowledge
          image: realgraph/agent-knowledge:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: platform-config
            - secretRef:
                name: platform-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: agent-knowledge
---
apiVersion: v1
kind: Service
metadata:
  name: agent-knowledge
  namespace: realgraph
spec:
  selector:
    app: agent-knowledge
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-knowledge
  namespace: realgraph
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-knowledge
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
