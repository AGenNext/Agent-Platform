---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-dashboard
  namespace: realgraph
  labels:
    app: agent-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-dashboard
  template:
    metadata:
      labels:
        app: agent-dashboard
    spec:
      containers:
        - name: agent-dashboard
          image: realgraph/agent-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: AGENT_KNOWLEDGE_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: AGENT_KNOWLEDGE_URL
            - name: PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: agent-dashboard
  namespace: realgraph
spec:
  selector:
    app: agent-dashboard
  ports:
    - port: 3000
      targetPort: 3000
