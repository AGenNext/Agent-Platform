services:
  surrealdb:
    image: docker.io/surrealdb/surrealdb:v2.3.10
    command:
      - start
      - --user
      - root
      - --pass
      - root
      - rocksdb:/data/agent-runtime.db
    ports:
      - "8000:8000"
    volumes:
      - surrealdb-data:/data
    healthcheck:
      test: ["CMD", "surreal", "isready", "--conn", "http://127.0.0.1:8000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  surrealdb-data:
