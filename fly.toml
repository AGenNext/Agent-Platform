app = "agent-knowledge-api"
primary_region = "iad"

[build]
  dockerfile = "services/agent-knowledge-api/Dockerfile"
  build-target = ""

[env]
  PORT                  = "8001"
  SURREALDB_NAMESPACE   = "agent_platform"
  SURREALDB_DATABASE    = "agent_platform"
  # SURREALDB_URL, SURREALDB_USERNAME, SURREALDB_PASSWORD → set via fly secrets

[http_service]
  internal_port        = 8001
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "10s"
    interval     = "15s"
    method       = "GET"
    path         = "/health"
    port         = 8001
    timeout      = "5s"
    type         = "http"
