services:
  surrealdb:
    image: surrealdb/surrealdb:latest
    command: start --log trace --user root --pass root memory
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "surreal", "isready", "--conn", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  agent-knowledge-api:
    build:
      context: ./services/agent-knowledge-api
      dockerfile: Dockerfile
    environment:
      SURREALDB_URL: ws://surrealdb:8000/rpc
      SURREALDB_NAMESPACE: agent_platform
      SURREALDB_DATABASE: agent_platform
      SURREALDB_USERNAME: root
      SURREALDB_PASSWORD: root
    ports:
      - "8001:8001"
    depends_on:
      surrealdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  agent-dashboard:
    build:
      context: ./services/agent-dashboard
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:8001
    ports:
      - "3000:3000"
    depends_on:
      agent-knowledge-api:
        condition: service_healthy

  sample-agents:
    build:
      context: ./services/sample-agents
      dockerfile: Dockerfile
    environment:
      PLATFORM_URL: http://agent-knowledge-api:8001
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Which agent to run: researcher | orchestrator | memory | demo
      AGENT_MODE: ${AGENT_MODE:-demo}
    depends_on:
      agent-knowledge-api:
        condition: service_healthy
    profiles:
      - agents
    command: >
      sh -c "
        case \"$$AGENT_MODE\" in
          researcher)   python src/researcher_agent.py ;;
          orchestrator) python src/orchestrator_agent.py ;;
          memory)       python src/memory_agent.py ;;
          a2a)          python src/a2a_agent.py ;;
          crewai)       python src/crewai_integration.py ;;
          autogen)      python src/autogen_integration.py ;;
          demo)         python src/langchain_integration_demo.py ;;
          *)            echo \"Unknown AGENT_MODE: $$AGENT_MODE\" && exit 1 ;;
        esac
      "

  ollama:
    image: ollama/ollama:latest
    profiles:
      - local-llm
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  minio_data:
  ollama_data:
