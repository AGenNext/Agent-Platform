services:
  surrealdb:
    image: surrealdb/surrealdb:latest
    command: start --log trace --user root --pass root memory
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "surreal", "isready", "--conn", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  agent-knowledge-api:
    image: python:3.11-slim
    working_dir: /workspace
    command: bash -lc "pip install --upgrade pip && pip install git+https://github.com/AGenNext/Agent-Team.git git+https://github.com/AGenNext/Agent-Frameworks.git git+https://github.com/AGenNext/Agent-Knowledge.git && uvicorn app.main:app --host 0.0.0.0 --port 8001"
    environment:
      SURREALDB_URL: ws://surrealdb:8000/rpc
      SURREALDB_NAMESPACE: agent_platform
      SURREALDB_DATABASE: agent_platform
    ports:
      - "8001:8001"
    depends_on:
      - surrealdb
      - minio

  agent-dashboard:
    image: node:20-slim
    working_dir: /workspace
    command: bash -lc "apt-get update && apt-get install -y git && git clone https://github.com/AGenNext/Agent-Dashboard.git . && npm install && npm run dev"
    environment:
      VITE_AGENT_KNOWLEDGE_API_URL: http://localhost:8001
    ports:
      - "3000:3000"
    depends_on:
      - agent-knowledge-api

  ollama:
    image: ollama/ollama:latest
    profiles:
      - local-llm
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  minio_data:
  ollama_data:
